<div class="h-screen w-screen flex overflow-hidden font-sans">

  <aside
    class="bg-slate-900 text-white flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out relative z-20 shadow-xl"
    [ngClass]="isSidebarCollapsed() ? 'w-16' : 'w-64'">

    <div class="h-16 flex items-center justify-center border-b border-slate-700">
      <span class="text-2xl font-bold tracking-widest text-white transition-opacity duration-300"
            *ngIf="!isSidebarCollapsed()">SGPS</span>
      <i class="pi pi-box text-xl text-blue-400" *ngIf="isSidebarCollapsed()" title="SGPS"></i>
    </div>

    <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto overflow-x-hidden">

      <a routerLink="/requerimientos" routerLinkActive="bg-slate-700 text-white"
         class="flex items-center gap-3 px-3 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-150 cursor-pointer group"
         [title]="isSidebarCollapsed() ? 'Requerimientos' : ''">
        <i class="pi pi-briefcase text-lg min-w-[20px] text-center group-hover:text-blue-400"></i>
        <div class="menu-text-container transition-opacity duration-300"
             [ngClass]="isSidebarCollapsed() ? 'opacity-0 w-0' : 'opacity-100'">
          <span class="text-sm font-medium">Requerimientos</span>
        </div>
      </a>

      <a routerLink="/informes" routerLinkActive="bg-slate-700 text-white"
         class="flex items-center gap-3 px-3 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-150 cursor-pointer group"
         [title]="isSidebarCollapsed() ? 'Informes' : ''">
        <i class="pi pi-file text-lg min-w-[20px] text-center group-hover:text-blue-400"></i>
        <div class="menu-text-container transition-opacity duration-300"
             [ngClass]="isSidebarCollapsed() ? 'opacity-0 w-0' : 'opacity-100'">
          <span class="text-sm font-medium">Informes</span>
        </div>
      </a>

    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden bg-gray-50">

    <header class="bg-white shadow-sm border-b border-slate-200 h-16 px-6 flex items-center justify-between flex-shrink-0 z-10">

      <div>
        <button
          (click)="toggleSidebar()"
          class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-blue-600 transition-colors focus:outline-none"
          title="Alternar Menú">
          <i class="pi pi-bars text-xl"></i>
        </button>
      </div>

      <div *ngIf="usuarioActual() as user"
     class="flex items-center gap-3 p-1 pr-3 rounded-full hover:bg-slate-50 transition-all border border-transparent hover:border-slate-200"
     [title]="user.nombre">

  <div class="w-9 h-9 rounded-full bg-blue-100 text-blue-700 font-bold flex items-center justify-center text-sm shadow-sm">
    {{ user.iniciales }}
  </div>

  <div class="hidden sm:flex flex-col items-start leading-tight">
    <span class="text-xs text-slate-400 font-medium uppercase tracking-wider">Conectado como</span>
    <span class="text-sm font-semibold text-slate-700">{{ user.email }}</span>
  </div>

  <i class="pi pi-angle-down text-slate-400 text-xs ml-1"></i>
</div>

    </header>

    <main class="flex-1 overflow-auto p-4 md:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
