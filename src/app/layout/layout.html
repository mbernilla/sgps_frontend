<div class="h-screen w-screen flex overflow-hidden font-sans">

  <aside
    class="bg-slate-900 text-white flex flex-col flex-shrink-0 transition-all duration-300 ease-in-out relative z-20 shadow-xl"
    [ngClass]="isSidebarCollapsed() ? 'w-16' : 'w-64'">

    <div class="h-16 flex items-center justify-center border-b border-slate-700">
      <span class="text-2xl font-bold tracking-widest text-white transition-opacity duration-300"
            *ngIf="!isSidebarCollapsed()">SGPS</span>
      <i class="pi pi-box text-xl text-blue-400" *ngIf="isSidebarCollapsed()" title="SGPS"></i>
    </div>

    <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto overflow-x-hidden">

      <a routerLink="/requerimientos" routerLinkActive="bg-slate-700 text-white"
         class="flex items-center gap-3 px-3 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-150 cursor-pointer group"
         [title]="isSidebarCollapsed() ? 'Requerimientos' : ''">
        <i class="pi pi-briefcase text-lg min-w-[20px] text-center group-hover:text-blue-400"></i>
        <div class="menu-text-container transition-opacity duration-300"
             [ngClass]="isSidebarCollapsed() ? 'opacity-0 w-0' : 'opacity-100'">
          <span class="text-sm font-medium">Requerimientos</span>
        </div>
      </a>

      <a routerLink="/informes" routerLinkActive="bg-slate-700 text-white"
         class="flex items-center gap-3 px-3 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-150 cursor-pointer group"
         [title]="isSidebarCollapsed() ? 'Informes' : ''">
        <i class="pi pi-file text-lg min-w-[20px] text-center group-hover:text-blue-400"></i>
        <div class="menu-text-container transition-opacity duration-300"
             [ngClass]="isSidebarCollapsed() ? 'opacity-0 w-0' : 'opacity-100'">
          <span class="text-sm font-medium">Informes</span>
        </div>
      </a>

      <a routerLink="/conciliaciones/maestro" routerLinkActive="bg-slate-700 text-white"
         class="flex items-center gap-3 px-3 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-150 cursor-pointer group"
         [title]="isSidebarCollapsed() ? 'Conciliaciones' : ''">
        <i class="pi pi-sync text-lg min-w-[20px] text-center group-hover:text-blue-400"></i>
        <div class="menu-text-container transition-opacity duration-300"
             [ngClass]="isSidebarCollapsed() ? 'opacity-0 w-0' : 'opacity-100'">
          <span class="text-sm font-medium">Conciliaciones</span>
        </div>
      </a>

      <div class="pt-2 pb-1" *ngIf="!isSidebarCollapsed()">
        <div class="border-t border-slate-700 mb-2"></div>
        <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-widest">Maestros</p>
      </div>
      <div *ngIf="isSidebarCollapsed()" class="border-t border-slate-700 my-2 mx-2"></div>

      <a routerLink="/maestros/sistemas" routerLinkActive="bg-slate-700 text-white"
         class="flex items-center gap-3 px-3 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-150 cursor-pointer group"
         [title]="isSidebarCollapsed() ? 'Sistemas y Módulos' : ''">
        <i class="pi pi-server text-lg min-w-[20px] text-center group-hover:text-blue-400"></i>
        <div class="menu-text-container transition-opacity duration-300"
             [ngClass]="isSidebarCollapsed() ? 'opacity-0 w-0' : 'opacity-100'">
          <span class="text-sm font-medium">Sistemas y Módulos</span>
        </div>
      </a>

      <a routerLink="/maestros/catalogo-entregables" routerLinkActive="bg-slate-700 text-white"
         class="flex items-center gap-3 px-3 py-3 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-150 cursor-pointer group"
         [title]="isSidebarCollapsed() ? 'Catálogo de Entregables' : ''">
        <i class="pi pi-box text-lg min-w-[20px] text-center group-hover:text-blue-400"></i>
        <div class="menu-text-container transition-opacity duration-300"
             [ngClass]="isSidebarCollapsed() ? 'opacity-0 w-0' : 'opacity-100'">
          <span class="text-sm font-medium">Catál. Entregables</span>
        </div>
      </a>

    </nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 overflow-hidden bg-gray-50">

    <header class="bg-white shadow-sm border-b border-slate-200 h-16 px-6 flex items-center justify-between flex-shrink-0 z-10">

      <div>
        <button (click)="toggleSidebar()" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-blue-600 transition-colors focus:outline-none" title="Alternar Menú">
          <i class="pi pi-bars text-xl"></i>
        </button>
      </div>

      <div class="relative flex items-center gap-4 sm:gap-6">

        <!-- SELECTOR DE CONTRATO (NUEVO) -->
        <div class="flex items-center gap-2">
          <label for="selectorContrato" class="hidden sm:block text-xs font-bold text-slate-500 uppercase tracking-wider">
            Contexto:
          </label>
          <select
            id="selectorContrato"
            [(ngModel)]="idContratoSeleccionado"
            (ngModelChange)="onCambioContrato($event)"
            class="bg-slate-50 border border-slate-200 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2 pr-8 outline-none transition-colors cursor-pointer shadow-sm hover:border-slate-300">

            <option [ngValue]="null" disabled>Seleccione un contrato...</option>

            <optgroup *ngFor="let grupo of contratosAgrupados" [label]="grupo.fabricaNombre" class="font-bold text-slate-800 bg-slate-100">
              <option *ngFor="let contrato of grupo.contratos" [ngValue]="contrato.id" class="font-normal text-slate-600 bg-white">
                {{ contrato.codigoContrato }}
              </option>
            </optgroup>

          </select>
        </div>

        <!-- DIVISOR VERTICAL (NUEVO) -->
        <div class="hidden sm:block h-8 w-px bg-slate-200"></div>

        <!-- MENU DE USUARIO (TU CÓDIGO ORIGINAL) -->
        <div *ngIf="usuarioActual() as user"
             (click)="userMenu.toggle($event)"
             class="cursor-pointer flex items-center gap-3 p-1 pr-3 rounded-full hover:bg-slate-50 transition-all border border-transparent hover:border-slate-200"
             [title]="user.nombre">

          <div class="w-9 h-9 rounded-full bg-blue-100 text-blue-700 font-bold flex items-center justify-center text-sm shadow-sm">
            {{ user.iniciales }}
          </div>

          <div class="hidden sm:flex flex-col items-start leading-tight">
            <span class="text-xs text-slate-400 font-medium uppercase tracking-wider">Conectado como</span>
            <span class="text-sm font-semibold text-slate-700">{{ user.email }}</span>
          </div>

          <i class="pi pi-angle-down text-slate-400 text-xs ml-1"></i>
        </div>

        <p-menu #userMenu [model]="userMenuItems" [popup]="true" styleClass="w-56 mt-2" appendTo="body"></p-menu>

      </div>

    </header>

    <main class="flex-1 overflow-auto p-4 md:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
